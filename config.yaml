data:
  paths:
    raw: data/raw
    processed: data/processed
    external: data/external
    models: models/
    reports: docs/evaluation/
  sources:
    climate:
      name: NASA_POWER
      endpoint: https://power.larc.nasa.gov/api/temporal/daily/point
      params:
        parameters: "T2M,PRECTOTCORR,RH2M,WS2M"
        community: "RE"
        longitude: 36.8219
        latitude: -1.2921
        start: "20170101"
        end: "20260201"
        format: "JSON"
    health:
      name: WHO_GHO
      endpoint: https://ghoapi.azureedge.net/api/Indicator
    disasters:
      name: EM_DAT
      endpoint: https://public.emdat.be/data
  processing:
    cleaning:
      knn_neighbors: 5
      z_threshold: 3
    features:
      pearson_threshold: 0.7
      rfe_n_features: 10
  sampling:
    target_samples: 35000
models:
  lstm:
    units: 64
    dropout: 0.2
    epochs: 50
    batch_size: 32
    lookback: 12
  xgboost:
    n_estimators: 200
    max_depth: 5
    learning_rate: 0.1
  hybrid:
    random_seed: 42
    test_size: 0.15
    val_size: 0.15
    grid_search:
      cv: 5
evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - mae
    - rmse
    - roc_auc
  target_f1: 0.85
